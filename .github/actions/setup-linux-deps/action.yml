name: 'Setup Linux Dependencies'
description: 'Installs Linux dependencies required for Flutter desktop builds'

runs:
  using: 'composite'
  steps:
    - name: Update Package Lists
      shell: bash
      run: sudo apt-get update
    
    - name: Install Flutter Linux Dependencies
      shell: bash
      run: |
        sudo apt-get install -y \
          clang \
          cmake \
          ninja-build \
          pkg-config \
          libgtk-3-dev \
          liblzma-dev \
          libstdc++-12-dev