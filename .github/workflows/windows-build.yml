name: 'Windows Build'

on:
  workflow_call:
    inputs:
      upload-artifacts:
        description: 'Whether to upload build artifacts'
        required: false
        default: false
        type: boolean
      artifact-retention:
        description: 'Artifact retention days'
        required: false
        default: 30
        type: number
      flutter-version:
        description: 'Flutter version to use'
        required: false
        default: '3.35.3'
        type: string
      run-tests:
        description: 'Whether to run tests'
        required: false
        default: false
        type: boolean

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
    
    - name: Setup Flutter Environment
      uses: ./.github/actions/setup-flutter
      with:
        flutter-version: ${{ inputs.flutter-version }}
        enable-desktop: windows
    
    - name: Check Dart Format
      if: inputs.run-tests
      working-directory: flow_frontend
      run: dart format .
    
    - name: Analyze Flutter Code
      if: inputs.run-tests
      working-directory: flow_frontend
      run: flutter analyze --no-fatal-infos --no-fatal-warnings
    
    - name: Run Flutter Tests
      if: inputs.run-tests
      working-directory: flow_frontend
      run: flutter test --coverage
    
    - name: Upload Coverage
      if: inputs.run-tests
      uses: codecov/codecov-action@v4
      with:
        file: flow_frontend/coverage/lcov.info
        flags: frontend-windows
        name: frontend-windows-coverage
        fail_ci_if_error: false
    
    - name: Build Flutter App for Windows
      working-directory: flow_frontend
      run: flutter build windows --release
    
    - name: Create Windows Archive
      if: inputs.upload-artifacts
      run: |
        cd flow_frontend/build/windows/x64/runner/Release
        Compress-Archive -Path * -DestinationPath ../../../../../Flow-Windows-${{ github.run_id }}.zip
    
    - name: Copy Artifacts to Root
      if: inputs.upload-artifacts
      run: |
        # Copy Windows archive to root directory for upload
        Copy-Item "Flow-Windows-${{ github.run_id }}.zip" -Destination "."
        Get-ChildItem "Flow-Windows-${{ github.run_id }}.zip" | Format-List
    
    - name: Upload Build Artifacts
      if: inputs.upload-artifacts
      uses: actions/upload-artifact@v4
      with:
        name: windows-build-${{ github.run_id }}
        path: Flow-Windows-${{ github.run_id }}.zip
        retention-days: ${{ inputs.artifact-retention }}
