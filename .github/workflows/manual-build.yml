name: Manual Build - All Platforms

on:
  workflow_dispatch:
    inputs:
      build_frontend:
        description: 'Build Flutter Frontend'
        required: false
        default: true
        type: boolean
      build_backend:
        description: 'Build Kotlin Backend'
        required: false
        default: true
        type: boolean
      build_web:
        description: 'Build Web Version'
        required: false
        default: true
        type: boolean
      build_macos:
        description: 'Build macOS App'
        required: false
        default: true
        type: boolean
      build_windows:
        description: 'Build Windows App'
        required: false
        default: true
        type: boolean
      build_linux:
        description: 'Build Linux App'
        required: false
        default: true
        type: boolean
      build_plugin:
        description: 'Build Minecraft Plugin'
        required: false
        default: true
        type: boolean

jobs:
  # Backend Build Job
  build-backend:
    if: ${{ inputs.build_backend == true }}
    uses: ./.github/workflows/backend-build.yml
    with:
      build-type: 'release'
      upload-artifacts: true
      artifact-retention: 30

  # Minecraft Plugin Build Job
  build-plugin:
    if: ${{ inputs.build_plugin == true }}
    uses: ./.github/workflows/plugin-build.yml
    with:
      build-type: 'release'
      upload-artifacts: true
      artifact-retention: 30

  # Web Build Job
  build-web:
    if: ${{ inputs.build_web == true }}
    uses: ./.github/workflows/frontend-build.yml
    with:
      build-target: 'web'
      upload-artifacts: true
      artifact-retention: 30

  # macOS Build Job
  build-macos:
    if: ${{ inputs.build_macos == true }}
    uses: ./.github/workflows/frontend-build.yml
    with:
      build-target: 'macos'
      upload-artifacts: true
      artifact-retention: 30

  # Windows Build Job  
  build-windows:
    if: ${{ inputs.build_windows == true }}
    uses: ./.github/workflows/frontend-build.yml
    with:
      build-target: 'windows'
      upload-artifacts: true
      artifact-retention: 30

  # Linux Build Job
  build-linux:
    if: ${{ inputs.build_linux == true }}
    uses: ./.github/workflows/frontend-build.yml
    with:
      build-target: 'linux'
      upload-artifacts: true
      artifact-retention: 30

  # Summary Job
  build-summary:
    runs-on: ubuntu-latest
    needs: [build-backend, build-plugin, build-web, build-macos, build-windows, build-linux]
    if: always()
    steps:
    - name: Build Summary
      run: |
        echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
        echo "| Component | Status |" >> $GITHUB_STEP_SUMMARY
        echo "|-----------|--------|" >> $GITHUB_STEP_SUMMARY
        echo "| Backend | ${{ needs.build-backend.result || 'Skipped' }} |" >> $GITHUB_STEP_SUMMARY
        echo "| Plugin | ${{ needs.build-plugin.result || 'Skipped' }} |" >> $GITHUB_STEP_SUMMARY
        echo "| Web | ${{ needs.build-web.result || 'Skipped' }} |" >> $GITHUB_STEP_SUMMARY
        echo "| macOS | ${{ needs.build-macos.result || 'Skipped' }} |" >> $GITHUB_STEP_SUMMARY
        echo "| Windows | ${{ needs.build-windows.result || 'Skipped' }} |" >> $GITHUB_STEP_SUMMARY
        echo "| Linux | ${{ needs.build-linux.result || 'Skipped' }} |" >> $GITHUB_STEP_SUMMARY