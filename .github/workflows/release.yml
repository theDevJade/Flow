name: Create Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release Version (e.g., v1.0.0)'
        required: true
        type: string
      prerelease:
        description: 'Mark as pre-release'
        required: false
        default: false
        type: boolean
      draft:
        description: 'Create as draft release'
        required: false
        default: false
        type: boolean
  push:
    tags:
      - 'v*'

env:
  FLUTTER_VERSION: '3.35.3'
  JAVA_VERSION: '23'

jobs:
  # Create Release
  create-release:
    runs-on: ubuntu-latest
    outputs:
      tag_name: ${{ steps.version.outputs.version }}
      release_id: ${{ steps.create_release.outputs.id }}
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Get Version
      id: version
      run: |
        if [ "${{ github.event_name }}" = "push" ]; then
          echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
        else
          echo "version=${{ inputs.version }}" >> $GITHUB_OUTPUT
        fi
    
    - name: Generate Release Notes
      id: release_notes
      run: |
        if [ "${{ github.event_name }}" = "push" ]; then
          # Get the previous tag
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD~1 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            echo "## Changes since $PREV_TAG" > release_notes.md
            git log --pretty=format:"- %s (%h)" $PREV_TAG..HEAD >> release_notes.md
          else
            echo "## First Release" > release_notes.md
            echo "Initial release of Flow - AI Agent Development Platform" >> release_notes.md
          fi
        else
          echo "## Flow Release ${{ steps.version.outputs.version }}" > release_notes.md
          echo "Manual release created from workflow dispatch." >> release_notes.md
        fi
        echo "" >> release_notes.md
        echo "### Included Artifacts:" >> release_notes.md
        echo "- 🖥️ **Desktop Apps**: macOS (.app), Windows (.exe), Linux (AppImage)" >> release_notes.md
        echo "- 🌐 **Web App**: Ready-to-deploy web build" >> release_notes.md
        echo "- 🏗️ **Backend**: WebSocket server and core engine JARs" >> release_notes.md
        echo "- 🎮 **Minecraft Plugin**: PaperMC plugin JAR" >> release_notes.md
    
    - name: Create Release
      id: create_release
      uses: softprops/action-gh-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ steps.version.outputs.version }}
        name: Flow ${{ steps.version.outputs.version }}
        body_path: release_notes.md
        draft: ${{ inputs.draft || false }}
        prerelease: ${{ inputs.prerelease || false }}

  # Build Backend for Release
  build-backend-release:
    needs: create-release
    uses: ./.github/workflows/backend-build.yml
    with:
      build-type: 'release'
      upload-artifacts: false
      java-version: '23'
  
  # Upload Backend Release Assets
  upload-backend-assets:
    runs-on: ubuntu-latest
    needs: [create-release, build-backend-release]
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
    
    - name: Setup Java Environment
      uses: ./.github/actions/setup-java
      with:
        java-version: '23'
    
    - name: Build Release JARs
      run: |
        ./gradlew clean
        ./gradlew :webserver:shadowJar --no-daemon
        ./gradlew :flow:shadowJar --no-daemon
    
    - name: Rename JARs for Release
      run: |
        VERSION="${{ needs.create-release.outputs.tag_name }}"
        mv webserver/build/libs/*-all.jar "Flow-WebSocketServer-${VERSION}.jar" || true
        mv flow/build/libs/*-all.jar "Flow-CoreEngine-${VERSION}.jar" || true
    
    - name: Upload Backend JARs to Release
      uses: softprops/action-gh-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ needs.create-release.outputs.tag_name }}
        files: |
          Flow-WebSocketServer-*.jar
          Flow-CoreEngine-*.jar

  # Build Plugin for Release
  build-plugin-release:
    needs: create-release
    uses: ./.github/workflows/plugin-build.yml
    with:
      build-type: 'release'
      upload-artifacts: false
      java-version: '23'
  
  # Upload Plugin Release Asset  
  upload-plugin-asset:
    runs-on: ubuntu-latest
    needs: [create-release, build-plugin-release]
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
    
    - name: Setup Java Environment
      uses: ./.github/actions/setup-java
      with:
        java-version: '23'
    
    - name: Build Plugin JAR
      working-directory: plugin
      run: ./gradlew clean shadowJar --no-daemon
    
    - name: Find and Rename Plugin JAR
      run: |
        PLUGIN_JAR=$(find plugin/build/libs -name "*-all.jar" | head -1)
        if [ -n "$PLUGIN_JAR" ]; then
          mv "$PLUGIN_JAR" "Flow-MinecraftPlugin.jar"
        fi
    
    - name: Upload Plugin JAR to Release
      uses: softprops/action-gh-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ needs.create-release.outputs.tag_name }}
        files: Flow-MinecraftPlugin.jar

  # Build Web for Release  
  build-web-release:
    needs: create-release
    uses: ./.github/workflows/frontend-build.yml
    with:
      build-target: 'web'
      upload-artifacts: false
      artifact-retention: 30
  
  # Upload Web Release Asset
  upload-web-asset:
    runs-on: ubuntu-latest
    needs: [create-release, build-web-release]
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
    
    - name: Setup Flutter Environment
      uses: ./.github/actions/setup-flutter
      with:
        flutter-version: '3.24.0'
    
    - name: Build Web Release
      working-directory: flow_frontend
      run: flutter build web --release --web-renderer html
    
    - name: Create Web Archive
      run: |
        cd flow_frontend/build
        tar -czf ../../Flow-Web.tar.gz web/
    
    - name: Upload Web Build to Release
      uses: softprops/action-gh-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ needs.create-release.outputs.tag_name }}
        files: Flow-Web.tar.gz

  # Build Desktop Apps for Release
  build-desktop-release:
    needs: create-release
    strategy:
      matrix:
        platform: [macos, windows, linux]
    uses: ./.github/workflows/frontend-build.yml
    with:
      build-target: ${{ matrix.platform }}
      upload-artifacts: false
      artifact-retention: 30