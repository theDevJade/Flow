name: 'Reusable Frontend Build'

on:
  workflow_call:
    inputs:
      build-target:
        description: 'Build target: web, macos, windows, linux, or test'
        required: true
        type: string
      upload-artifacts:
        description: 'Whether to upload build artifacts'
        required: false
        default: false
        type: boolean
      artifact-retention:
        description: 'Artifact retention days'
        required: false
        default: 30
        type: number
      flutter-version:
        description: 'Flutter version to use'
        required: false
        default: '3.35.3'
        type: string
      run-tests:
        description: 'Whether to run tests'
        required: false
        default: false
        type: boolean

jobs:
  build-frontend:
    runs-on: ${{ inputs.build-target == 'macos' && 'macos-latest' || inputs.build-target == 'windows' && 'windows-latest' || 'ubuntu-latest' }}
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
    
    - name: Setup Linux Dependencies
      if: inputs.build-target == 'linux'
      uses: ./.github/actions/setup-linux-deps
    
    - name: Setup Flutter Environment
      uses: ./.github/actions/setup-flutter
      with:
        flutter-version: ${{ inputs.flutter-version }}
        enable-desktop: ${{ inputs.build-target == 'test' && 'none' || inputs.build-target == 'web' && 'none' || inputs.build-target }}
    
    - name: Check Dart Format
      if: inputs.run-tests
      working-directory: flow_frontend
      run: dart format .
    
    - name: Build Flutter App
      if: inputs.build-target != 'test'
      working-directory: flow_frontend
      run: |
        case "${{ inputs.build-target }}" in
          "web")
            flutter build web --release
            ;;
          "macos")
            flutter build macos --release
            ;;
          "windows")
            flutter build windows --release
            ;;
          "linux")
            flutter build linux --release
            ;;
          *)
            echo "Unknown build target: ${{ inputs.build-target }}"
            exit 1
            ;;
        esac
    
    - name: Create Web Archive
      if: inputs.upload-artifacts && inputs.build-target == 'web'
      run: |
        cd flow_frontend/build
        tar -czf ../../Flow-Web-${{ github.run_id }}.tar.gz web/
    
    - name: Create macOS Archive
      if: inputs.upload-artifacts && inputs.build-target == 'macos'
      run: |
        cd flow_frontend/build/macos/Build/Products/Release
        if [ -d "flow_frontend.app" ]; then
          ditto -c -k --sequesterRsrc --keepParent flow_frontend.app ../../../../../Flow-macOS-${{ github.run_id }}.zip
        else
          echo "macOS app not found, creating empty archive"
          touch ../../../../../Flow-macOS-${{ github.run_id }}.zip
        fi
    
    - name: Create Windows Archive
      if: inputs.upload-artifacts && inputs.build-target == 'windows'
      run: |
        cd flow_frontend/build/windows/x64/runner/Release
        tar -czf ../../../../../Flow-Windows-${{ github.run_id }}.tar.gz *
    
    - name: Create Linux Archive
      if: inputs.upload-artifacts && inputs.build-target == 'linux'
      run: |
        cd flow_frontend/build/linux/x64/release
        tar -czf ../../../../../Flow-Linux-${{ github.run_id }}.tar.gz bundle/
    
    - name: Find Build Artifacts
      if: inputs.upload-artifacts && inputs.build-target != 'test'
      run: |
        echo "Searching for Flow build artifacts:"
        find . -name "Flow-*-${{ github.run_id }}.*" -type f
        echo "Found artifacts:"
        find . -name "Flow-*-${{ github.run_id }}.*" -type f -exec ls -la {} \;
    
    - name: Upload Build Artifacts
      if: inputs.upload-artifacts && inputs.build-target != 'test'
      uses: actions/upload-artifact@v4
      with:
        name: ${{ inputs.build-target }}-build-${{ github.run_id }}
        path: |
          **/Flow-*-${{ github.run_id }}.*
        retention-days: ${{ inputs.artifact-retention }}